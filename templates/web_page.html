<!DOCTYPE html>
<html lang="en" style="background:#0b0a10;">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0b0a10">
  <title>Lori's Summon</title>
  <style>
    :root {
      --bg: #0b0a10;
      --panel: #16131f;
      --accent-rgb: 255, 22, 148;
      --panel-edge: rgba(var(--accent-rgb), 0.28);
      --accent: #ff1694;
      --accent-strong: #ff4cb0;
      --accent-soft: #ff8acb;
      --accent-pale: #ffc0e4;
      --text: #f7f4fb;
      --muted: #b9adc8;
      --field: #110f18;
      --toast-text: #fff1fa;
      --toast-soft: rgba(var(--accent-rgb), 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #0b0a10;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      min-height: 100svh;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(var(--accent-rgb), 0.24), transparent 36%),
        radial-gradient(circle at bottom, rgba(var(--accent-rgb), 0.14), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body.loading .page-shell,
    body.loading #login-panel,
    body.loading #app-panel,
    body.loading #logout-button {
      visibility: hidden;
    }

    .page-shell {
      min-height: 100svh;
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: visible;
      padding:
        clamp(24px, 7vh, 64px) 24px max(24px, env(safe-area-inset-bottom));
    }

    .card {
      width: min(100%, 640px);
      max-height: none;
      overflow: visible;
      padding: 32px;
      border-radius: 28px;
      border: 1px solid var(--panel-edge);
      background: linear-gradient(180deg, rgba(31, 24, 42, 0.96), rgba(17, 14, 25, 0.96));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.52);
    }

    .hidden {
      display: none !important;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .hero-brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .hero-icon {
      width: 82px;
      height: 82px;
      border-radius: 24px;
      object-fit: contain;
      flex: 0 0 auto;
      border: none;
      box-shadow:
        0 14px 28px rgba(255, 218, 238, 0.12),
        0 0 22px rgba(var(--accent-rgb), 0.14);
      background: rgba(255, 20, 147, 0.5);
    }

    .hero-copy {
      min-width: 0;
    }

    .toolbar-button {
      width: auto;
      min-width: 112px;
      margin: 0;
      padding: 12px 16px;
      border: 1px solid rgba(var(--accent-rgb), 0.26);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent-pale);
      box-shadow: none;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
    }

    .toolbar-button:hover {
      background: rgba(var(--accent-rgb), 0.12);
      filter: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.75rem);
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--accent-strong);
      font-size: 1.05rem;
      font-weight: 700;
    }

    .toast-stack {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 40;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: min(460px, calc(100vw - 32px));
      pointer-events: none;
      align-items: center;
    }

    .toast {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(var(--accent-rgb), 0.35);
      background: rgba(20, 15, 28, 0.92);
      color: var(--toast-text);
      font-weight: 700;
      line-height: 1.4;
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.36);
      opacity: 0;
      transform: translateY(12px) scale(0.98);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .toast.success {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #220613;
      border-color: rgba(255, 241, 250, 0.42);
    }

    .toast.error {
      background: linear-gradient(180deg, rgba(56, 19, 42, 0.98), rgba(31, 14, 24, 0.98));
      color: #ffd9ee;
      border-color: rgba(var(--accent-rgb), 0.35);
    }

    .confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 30;
    }

    .confetti-piece {
      position: absolute;
      width: var(--size);
      height: var(--size);
      opacity: 0;
      perspective: 48px;
      transform-origin: center;
      will-change: transform, opacity;
    }

    .confetti-heart {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: var(--size);
      line-height: 1;
      color: var(--heart-color);
      text-shadow: 0 8px 20px rgba(var(--accent-rgb), 0.22);
      backface-visibility: hidden;
      transform-origin: center;
      will-change: transform;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field-group+.field-group {
      margin-top: 18px;
    }

    .auth-note {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .textarea-shell {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 210px;
      padding: 18px 58px 18px 18px;
      border: 1px solid rgba(var(--accent-rgb), 0.3);
      border-radius: 18px;
      background: var(--field);
      color: var(--text);
      resize: vertical;
      font: inherit;
      font-size: 16px;
      line-height: 1.5;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(var(--accent-rgb), 0.06);
    }

    .placeholder-refresh {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 34px;
      height: 34px;
      margin: 0;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(var(--accent-rgb), 0.24);
      background: rgba(255, 255, 255, 0.04);
      color: var(--accent-pale);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
      z-index: 2;
    }

    .placeholder-refresh:hover {
      filter: none;
      background: rgba(var(--accent-rgb), 0.14);
      color: #fff5fb;
    }

    .placeholder-refresh:disabled {
      opacity: 0.72;
      cursor: pointer;
    }

    .placeholder-refresh svg {
      width: 16px;
      height: 16px;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.18);
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
      align-items: start;
    }

    .select-shell {
      position: relative;
    }

    .select-shell::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 16px;
      width: 10px;
      height: 10px;
      margin-top: -7px;
      border-right: 2px solid rgba(255, 255, 255, 0.75);
      border-bottom: 2px solid rgba(255, 255, 255, 0.75);
      transform: rotate(45deg);
      pointer-events: none;
    }

    input[type="text"],
    input[type="search"],
    input[type="password"],
    select,
    input[type="file"] {
      width: 100%;
      border: 1px solid rgba(var(--accent-rgb), 0.3);
      border-radius: 18px;
      background: var(--field);
      color: var(--text);
      font: inherit;
      font-size: 15px;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(var(--accent-rgb), 0.06);
    }

    input[type="text"],
    input[type="search"],
    input[type="password"],
    select {
      min-height: 56px;
      padding: 0 16px;
    }

    select {
      padding-right: 44px;
      appearance: none;
      cursor: pointer;
    }

    input[type="file"] {
      min-height: 56px;
      padding: 8px 10px;
      cursor: pointer;
    }

    input[type="text"]:focus,
    input[type="search"]:focus,
    input[type="password"]:focus,
    select:focus,
    input[type="file"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.18);
    }

    input[type="file"]::file-selector-button {
      margin-right: 14px;
      padding: 10px 14px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.92), rgba(255, 76, 176, 0.92));
      color: #220613;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(var(--accent-rgb), 0.2);
    }

    .attachment-status {
      min-height: 1.35em;
      margin: 10px 2px 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .voice-note-shell {
      padding: 16px;
      border: 1px solid rgba(var(--accent-rgb), 0.22);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
    }

    .voice-note-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button.secondary-button {
      width: auto;
      margin-top: 0;
      padding: 12px 16px;
      border: 1px solid rgba(var(--accent-rgb), 0.28);
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent-pale);
      box-shadow: none;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
    }

    button.secondary-button:hover {
      background: rgba(var(--accent-rgb), 0.12);
      filter: none;
    }

    button.secondary-button.recording {
      background: rgba(var(--accent-rgb), 0.18);
      color: #fff5fb;
    }

    .voice-note-status {
      min-height: 1.35em;
      margin: 12px 2px 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .voice-note-preview {
      width: 100%;
      margin-top: 14px;
      accent-color: var(--accent);
    }

    .app-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    .tab-button {
      width: auto;
      margin-top: 0;
      padding: 12px 16px;
      border: 1px solid rgba(var(--accent-rgb), 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      box-shadow: none;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
    }

    .tab-button.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #1d0411;
      border-color: transparent;
      box-shadow: 0 12px 32px rgba(var(--accent-rgb), 0.2);
    }

    .tab-panel {
      min-height: 0;
    }

    .voice-notes-shell {
      max-height: min(52vh, 560px);
      overflow-y: auto;
      padding-right: 4px;
    }

    .voice-notes-toolbar {
      margin-bottom: 16px;
    }

    .voice-notes-toolbar-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    .voice-notes-status {
      min-height: 1.4em;
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .voice-notes-status:empty {
      display: none;
    }

    .voice-notes-list {
      display: grid;
      gap: 14px;
    }

    .voice-note-card {
      border-radius: 18px;
      border: 1px solid rgba(var(--accent-rgb), 0.2);
      background: rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .voice-note-card-summary {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: stretch;
      padding: 14px 16px;
      cursor: pointer;
      list-style: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .voice-note-card-summary::-webkit-details-marker {
      display: none;
    }

    .voice-note-card-summary-main {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .voice-note-card-summary-top {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .voice-note-card-time-row {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .voice-note-card-time {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.4;
      white-space: nowrap;
    }

    .voice-note-card-time-separator {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.34);
      flex: 0 0 auto;
    }

    .voice-note-card-time-label {
      color: var(--accent-soft);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .voice-note-card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .voice-note-card-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      border: 1px solid rgba(var(--accent-rgb), 0.22);
      background: rgba(255, 255, 255, 0.04);
      color: var(--accent-pale);
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .voice-note-card-badge.priority-lowest {
      color: #d7cce6;
    }

    .voice-note-card-badge.priority-low {
      color: #b9d6ff;
    }

    .voice-note-card-badge.priority-normal {
      color: #ffe59e;
    }

    .voice-note-card-badge.priority-high {
      color: #ffc6df;
    }

    .voice-note-card-badge.priority-emergency,
    .voice-note-card-badge.attention {
      border-color: rgba(255, 94, 126, 0.34);
      color: #ffd0da;
      background: rgba(255, 94, 126, 0.08);
    }

    .voice-note-card-badge.acked-pill {
      color: #c9ffd8;
      border-color: rgba(94, 255, 154, 0.26);
      background: rgba(94, 255, 154, 0.08);
    }

    .voice-note-card-badge.unacked-pill {
      color: #ffe0aa;
      border-color: rgba(255, 190, 94, 0.28);
      background: rgba(255, 190, 94, 0.08);
    }

    .voice-note-card-preview {
      display: block;
      margin-top: 9px;
      color: var(--accent-pale);
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: normal;
      word-break: break-word;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .voice-note-card-chevron {
      width: 12px;
      height: 12px;
      margin-top: 8px;
      flex: 0 0 auto;
      border-right: 2px solid rgba(255, 255, 255, 0.5);
      border-bottom: 2px solid rgba(255, 255, 255, 0.5);
      transform: rotate(45deg);
      transition: transform 140ms ease, border-color 140ms ease;
    }

    .voice-note-card[open] .voice-note-card-chevron {
      transform: rotate(225deg);
      border-color: rgba(var(--accent-rgb), 0.8);
    }

    .voice-note-card[open] .voice-note-card-summary {
      background: rgba(var(--accent-rgb), 0.04);
    }

    .voice-note-card[open] .voice-note-card-preview {
      overflow: visible;
      display: block;
      -webkit-line-clamp: unset;
    }

    .voice-note-card-body {
      display: grid;
      gap: 10px;
      padding: 14px 16px 16px;
      border-top: 1px solid rgba(var(--accent-rgb), 0.12);
    }

    .voice-note-card-actions {
      display: grid;
      grid-template-columns: repeat(var(--voice-note-action-count, 4), minmax(0, 1fr));
      gap: 6px;
    }

    .voice-note-card-actions a.secondary-button,
    .voice-note-card-actions button.secondary-button {
      width: 100%;
      text-decoration: none;
      min-height: 38px;
      padding: 8px 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.15;
      text-transform: none;
    }

    .voice-note-card-actions button.secondary-button {
      min-width: 0;
    }

    .voice-note-card-actions .destructive {
      border-color: rgba(255, 94, 126, 0.32);
      color: #ffd0da;
    }

    .voice-note-inline-player {
      width: 100%;
      accent-color: var(--accent);
    }

    .summon-attachment-preview {
      width: 100%;
      display: block;
      border-radius: 14px;
      border: 1px solid rgba(var(--accent-rgb), 0.18);
      background: rgba(255, 255, 255, 0.04);
      object-fit: cover;
      max-height: 240px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.22);
    }

    .summon-attachment-link {
      display: block;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
    }

    .voice-notes-sentinel {
      height: 1px;
    }

    .control-grid .field-group {
      margin-top: 0;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 16px 18px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #1d0411;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(var(--accent-rgb), 0.28);
      transition: filter 140ms ease, transform 140ms ease, opacity 140ms ease;
    }

    button:hover {
      filter: brightness(1.06);
    }

    button:disabled {
      opacity: 0.72;
      cursor: wait;
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      .page-shell {
        padding:
          max(6px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(22px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      }

      .card {
        width: 100%;
        padding: 22px 18px 18px;
        border-radius: 22px;
        margin-top: 0;
        margin-bottom: max(18px, env(safe-area-inset-bottom));
      }

      .hero {
        gap: 12px;
        margin-bottom: 20px;
        align-items: flex-start;
      }

      .hero-icon {
        width: 66px;
        height: 66px;
        border-radius: 18px;
        padding: 7px;
      }

      h1 {
        font-size: clamp(1.75rem, 8vw, 2.2rem);
      }

      .subtitle {
        margin-top: 6px;
        font-size: 0.98rem;
      }

      .toolbar-button {
        min-width: 0;
        padding: 11px 14px;
        font-size: 0.8rem;
      }

      label {
        font-size: 0.84rem;
      }

      .toast-stack {
        bottom: max(16px, env(safe-area-inset-bottom));
        width: calc(100vw - 20px);
      }

      textarea {
        min-height: 170px;
        padding: 16px 54px 16px 16px;
      }

      input[type="text"],
      input[type="search"],
      input[type="password"],
      select {
        min-height: 48px;
        padding: 0 14px;
      }

      input[type="file"] {
        min-height: 50px;
        padding: 7px 8px;
      }

      input[type="file"]::file-selector-button {
        padding: 9px 12px;
        font-size: 0.78rem;
      }

      .control-grid {
        grid-template-columns: 1fr;
        gap: 14px;
        margin-top: 16px;
      }

      .placeholder-refresh {
        top: 10px;
        right: 10px;
        width: 32px;
        height: 32px;
      }

      .voice-note-actions {
        flex-direction: column;
      }

      button.secondary-button {
        width: 100%;
      }

      .app-tabs {
        flex-direction: column;
        gap: 10px;
      }

      .tab-button {
        width: 100%;
      }

      .voice-notes-shell {
        max-height: min(58vh, 520px);
      }

      .voice-notes-toolbar {
        margin-bottom: 12px;
      }

      .voice-notes-toolbar-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .voice-notes-toolbar-grid .field-group:first-child {
        grid-column: 1 / -1;
      }

      .voice-note-card-summary {
        gap: 10px;
        padding: 12px 13px;
      }

      .voice-note-card-summary-top {
        gap: 8px;
      }

      .voice-note-card-time {
        white-space: normal;
      }

      .voice-note-card-preview {
        font-size: 0.91rem;
      }

      .voice-note-card-body {
        gap: 10px;
        padding: 12px 13px 13px;
      }

      .voice-note-card-actions {
        gap: 5px;
      }

      .voice-note-card-actions button.secondary-button {
        min-height: 36px;
        padding: 7px 4px;
        font-size: 0.66rem;
        letter-spacing: 0.01em;
      }

      .summon-attachment-preview {
